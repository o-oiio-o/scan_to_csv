<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>语音反馈扫码记录器</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 15px;
            background-color: #f8f9fa;
            color: #333;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        .status-bar {
            margin: 10px 0;
            padding: 8px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            min-height: 20px;
        }
        .status-idle { background: #eee; }
        .status-success { background: #d4edda; color: #155724; }
        .status-warn { background: #fff3cd; color: #856404; }
        .status-error { background: #f8d7da; color: #721c24; }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.8; }
        #start-btn { background-color: var(--primary); grid-column: span 2; }
        #stop-btn { background-color: #6c757d; display: none; grid-column: span 2; }
        #download-btn { background-color: var(--success); }
        #clear-btn { background-color: #f0ad4e; }

        .table-container {
            overflow-x: auto;
            max-height: 40vh;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th { background: #eee; position: sticky; top: 0; }
        th, td { padding: 10px; border: 1px solid #dee2e6; text-align: left; }
        tr:nth-child(even) { background: #fafafa; }
        .count-badge {
            float: right;
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h3 style="margin-top:0">扫码记录器 <span id="total-count" class="count-badge">总数: 0</span></h3>
        
        <!-- 扫码区域 -->
        <div id="reader"></div>
        
        <!-- 状态提示 -->
        <div id="status" class="status-bar status-idle">等待启动摄像头...</div>

        <div class="btn-group">
            <button id="start-btn" onclick="toggleCamera(true)">点击启动摄像头</button>
            <button id="stop-btn" onclick="toggleCamera(false)">停止摄像头</button>
            <button id="download-btn" onclick="exportToCSV()">导出 CSV</button>
            <button id="clear-btn" onclick="clearResults()">清空数据</button>
        </div>
    </div>

    <div class="card">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th width="30%">时间</th>
                        <th>扫描内容</th>
                    </tr>
                </thead>
                <tbody id="results-body">
                    <!-- 数据行 -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let scannedData = [];
        let html5QrCode = null;
        let audioCtx = null; // 用于生成提示音
        
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');

        // 初始化提示音功能 (浏览器要求必须由用户点击触发)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 发出“滴”的一声
        function playSuccessSound() {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine'; // 正弦波，声音清脆
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // A5 音高
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.2);
        }

        function initScanner() {
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }
        }

        async function toggleCamera(start) {
            initScanner();
            initAudio(); // 伴随用户点击初始化音频上下文

            if (start) {
                const config = { fps: 10, qrbox: { width: 250, height: 250 } };
                try {
                    await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
                    statusEl.innerText = "正在扫描中...";
                    statusEl.className = "status-bar status-idle";
                    startBtn.style.display = "none";
                    stopBtn.style.display = "block";
                } catch (err) {
                    statusEl.innerText = "启动失败: " + err;
                    statusEl.className = "status-bar status-error";
                }
            } else {
                if (html5QrCode) {
                    await html5QrCode.stop();
                    statusEl.innerText = "摄像头已停止";
                    statusEl.className = "status-bar status-idle";
                    startBtn.style.display = "block";
                    stopBtn.style.display = "none";
                }
            }
        }

        function onScanSuccess(decodedText) {
            // 1. 查重逻辑
            const isDuplicate = scannedData.some(item => item.content === decodedText);
            
            if (isDuplicate) {
                statusEl.innerText = "⚠️ 重复内容，已跳过";
                statusEl.className = "status-bar status-warn";
                // 重复时不播放声音，仅轻微震动提示
                if (navigator.vibrate) navigator.vibrate(50);
                return;
            }

            // 2. 成功逻辑：播放提示音 + 震动
            playSuccessSound(); 
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

            const now = new Date();
            const timeStr = now.toLocaleTimeString();
            const entry = { time: timeStr, content: decodedText };
            
            scannedData.unshift(entry);
            updateUI(entry);
            
            statusEl.innerText = "✅ 扫描成功！";
            statusEl.className = "status-bar status-success";
            
            // 自动重置状态文字
            setTimeout(() => {
                if(html5QrCode && html5QrCode.isScanning) {
                    statusEl.innerText = "正在扫描中...";
                    statusEl.className = "status-bar status-idle";
                }
            }, 2000);
        }

        function updateUI(entry) {
            const tbody = document.getElementById('results-body');
            const row = tbody.insertRow(0);
            row.insertCell(0).innerText = entry.time;
            row.insertCell(1).innerText = entry.content;
            document.getElementById('total-count').innerText = "总数: " + scannedData.length;
        }

        function exportToCSV() {
            if (scannedData.length === 0) return alert("没有数据");
            let csvContent = "\uFEFF时间,扫描内容\n";
            scannedData.forEach(item => {
                csvContent += `${item.time},"${item.content.replace(/"/g, '""')}"\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `scan_${new Date().getTime()}.csv`;
            link.click();
        }

        function clearResults() {
            if (confirm("确定清空数据吗？")) {
                scannedData = [];
                document.getElementById('results-body').innerHTML = "";
                document.getElementById('total-count').innerText = "总数: 0";
                statusEl.innerText = "已清空";
            }
        }
    </script>
</body>
</html>
